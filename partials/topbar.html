<a class="skip-link" href="#main">Salta al contenuto</a>
<header class="topbar">
  <a class="topbar__brand" href="index.html">
    <img class="topbar__logo" src="images/logo.png" alt="{{site.title}}">
    <span class="topbar__brand-text">
      {{site.title}}
      <span class="topbar__brand-sub">{{site.subtitle}}</span>
    </span>
  </a>
  <button class="topbar__menu-toggle" data-menu-toggle aria-label="Apri menu" aria-expanded="false" aria-controls="main-nav">☰</button>
  <nav class="topbar__nav" id="main-nav" data-menu>
    {{#each nav}}<a href="{{this.href}}">{{this.label}}</a>
    {{/each}}
  </nav>
</header>
